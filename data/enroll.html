<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESP32 — Quét WiFi</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#0f172a;color:#e2e8f0;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:1.5rem;font-size:18px;
}
.card{
  background:#1e293b;border:1px solid #334155;border-radius:16px;
  width:100%;max-width:540px;padding:2.5rem;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}
.top-bar{display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem}
.back-link{
  color:#818cf8;text-decoration:none;font-size:.95rem;font-weight:600;
  padding:.5rem .85rem;border:1px solid #475569;border-radius:8px;
  transition:all .2s;
}
.back-link:hover{background:rgba(99,102,241,.1);border-color:#6366f1}
.top-bar h1{font-size:1.35rem;font-weight:700;flex:1}
.subtitle{font-size:.95rem;color:#94a3b8;margin-bottom:1.25rem}
.btn{
  display:flex;align-items:center;justify-content:center;gap:.5rem;
  padding:.85rem 1rem;border:none;border-radius:10px;
  font-size:1rem;font-weight:600;cursor:pointer;
  transition:all .2s;font-family:inherit;width:100%;
}
.btn-scan{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;margin-bottom:1.25rem}
.btn-scan:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(99,102,241,.35)}
.btn-connect{
  background:transparent;border:1px solid #475569;color:#e2e8f0;
  font-size:.9rem;padding:.6rem .85rem;border-radius:8px;width:auto;
}
.btn-connect:hover{background:rgba(99,102,241,.1);border-color:#6366f1;color:#818cf8}
/* Table */
.wifi-table{width:100%;border-collapse:collapse;margin-top:.5rem}
.wifi-table th{
  text-align:left;padding:.7rem .85rem;font-size:.8rem;
  color:#64748b;text-transform:uppercase;letter-spacing:.05em;
  border-bottom:1px solid #334155;font-weight:600;
}
.wifi-table td{
  padding:.75rem .85rem;border-bottom:1px solid rgba(255,255,255,.04);
  font-size:.95rem;
}
.wifi-table tr:hover td{background:rgba(99,102,241,.04)}
.ssid-name{font-weight:600;color:#f1f5f9;font-size:1rem}
.signal{font-variant-numeric:tabular-nums;color:#94a3b8;font-size:.9rem}
.signal.strong{color:#34d399}
.signal.medium{color:#fbbf24}
.signal.weak{color:#f87171}
/* Status */
.scanning{
  text-align:center;padding:2.5rem 1rem;color:#94a3b8;font-size:1.05rem;
}
.scanning .dots::after{content:'...';animation:dots 1.5s infinite}
@keyframes dots{0%{content:'.'}33%{content:'..'}66%{content:'...'}}
.empty{text-align:center;padding:2rem;color:#64748b;font-size:.85rem}
</style>
<script>
function scanwifi(){
  var table=document.getElementById('WiFiList');
  // Clear old rows
  while(table.rows.length>1) table.deleteRow(1);
  
  // Show scanning state
  document.getElementById('status').style.display='block';
  document.getElementById('status').innerHTML='<span class="dots">Đang quét mạng</span>';
  
  fetch('/cgi/scan')
  .then(r=>r.text())
  .then(text=>{
    document.getElementById('status').style.display='none';
    if(!text||text.trim()===''){
      document.getElementById('status').style.display='block';
      document.getElementById('status').innerHTML='Không tìm thấy mạng WiFi nào.';
      document.getElementById('status').className='empty';
      return;
    }
    var list=text.split(',');
    list.push('<ẩn>');
    list.push('');
    for(var i=0;i<list.length;i+=2){
      var row=table.insertRow(-1);
      var c1=row.insertCell(0);
      var c2=row.insertCell(1);
      var c3=row.insertCell(2);
      
      var ssid=list[i];
      var rssi=parseInt(list[i+1])||0;
      var signalClass=rssi>-50?'strong':rssi>-70?'medium':'weak';
      var signalIcon=rssi>-50?'🟢':rssi>-70?'🟡':'🔴';
      
      c1.innerHTML='<span class="ssid-name">'+(ssid==='<ẩn>'?'🔒 Mạng ẩn':ssid)+'</span>';
      c2.innerHTML='<span class="signal '+signalClass+'">'+signalIcon+' '+rssi+'</span>';
      c3.innerHTML='<button class="btn-connect" onclick="setpassword(\''+ssid.replace(/'/g,"\\'")+'\')">Kết nối</button>';
    }
  })
  .catch(err=>{
    document.getElementById('status').style.display='block';
    document.getElementById('status').innerHTML='Lỗi quét WiFi. Thử lại.';
    document.getElementById('status').className='empty';
  });
}
function setpassword(ssid){
  if(ssid==='<ẩn>'){
    ssid=prompt('Nhập tên mạng WiFi ẩn:','');
    if(!ssid) return;
  }
  var pass=prompt('Nhập mật khẩu WiFi "'+ssid+'":','');
  if(pass==null) return;
  fetch('/cgi/save?s='+encodeURIComponent(ssid)+'&p='+encodeURIComponent(pass))
  .then(r=>r.text())
  .then(t=>alert(t));
}
</script>
</head>
<body onload="scanwifi()">
<div class="card">
  <div class="top-bar">
    <a class="back-link" href="/">← Quay lại</a>
    <h1>📶 Quét WiFi</h1>
  </div>
  <p class="subtitle">Chọn mạng WiFi rồi nhập mật khẩu để kết nối cho thiết bị.</p>
  
  <button class="btn btn-scan" onclick="scanwifi()">🔄 Quét lại</button>
  
  <div class="scanning" id="status"><span class="dots">Đang quét mạng</span></div>
  
  <table class="wifi-table" id="WiFiList">
    <tr>
      <th>Tên mạng</th>
      <th>Tín hiệu</th>
      <th></th>
    </tr>
  </table>
</div>
</body>
</html>
