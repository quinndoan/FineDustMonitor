; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
board_build.filesystem = littlefs
framework = arduino
monitor_speed = 115200
lib_deps = 
	olikraus/U8g2@^2.36.15
	knolleary/PubSubClient@^2.8
	miguelbalboa/MFRC522@^1.4.11
	bblanchon/ArduinoJson@^6.21.3

; Hardware configuration flags for ESP32
build_flags = 
	-DMCU_IS_ESP32
	-DENABLE_OLED_DISPLAY=1
	-DENABLE_NFC_MFRC522=1
	-DENABLE_RFID_125KHZ=1
	-DENABLE_WIFI=1
	-DENABLE_MQTT=1
	-DENABLE_BUZZER=1
	-DENABLE_CONFIG_BUTTON=1
	-DOLED_DISPLAY_TYPE_SH1106=1
;
; Optional: Override specific pins from defaults
; -DI2C_SDA_PIN=21
; -DI2C_SCL_PIN=22
; -DNFC_SS_PIN=5
; -DNFC_RST_PIN=32
; -DRFID_RX_PIN=16
; -DRFID_TX_PIN=17
; -DBUZZER_PIN=12
; -DCFG_BUTTON_PIN=4
